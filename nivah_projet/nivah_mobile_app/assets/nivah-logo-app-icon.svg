<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé de fond moderne -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond arrondi avec dégradé -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGradient)"/>

  <!-- Effet de profondeur - cercle décoratif -->
  <circle cx="750" cy="250" r="280" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="280" cy="780" r="220" fill="#FFFFFF" opacity="0.08"/>

  <!-- Icône shopping bag stylisée -->
  <g transform="translate(512, 380)">
    <!-- Sac à provisions moderne -->
    <path d="M -120 -40 L -140 160 Q -140 200 -100 200 L 100 200 Q 140 200 140 160 L 120 -40 Z"
          fill="url(#letterGradient)" opacity="0.95"/>

    <!-- Poignées du sac -->
    <path d="M -80 -40 Q -80 -100 -40 -100 Q 0 -100 0 -60"
          stroke="url(#letterGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M 80 -40 Q 80 -100 40 -100 Q 0 -100 0 -60"
          stroke="url(#letterGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Accent doré - étoile/étincelle -->
    <circle cx="60" cy="40" r="20" fill="url(#accentGradient)"/>
    <circle cx="60" cy="40" r="12" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Lettre "N" stylisée -->
  <g transform="translate(512, 650)">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="180"
          font-weight="900"
          fill="url(#letterGradient)"
          text-anchor="middle"
          letter-spacing="-4">
      NIVAH
    </text>
  </g>

  <!-- Petit point décoratif -->
  <circle cx="770" cy="650" r="14" fill="url(#accentGradient)"/>

  <!-- Effet de brillance -->
  <ellipse cx="300" cy="180" rx="200" ry="100" fill="#FFFFFF" opacity="0.15" transform="rotate(-25 300 180)"/>
</svg>
