<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé violet à bleu moderne -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Dégradé pour le sac -->
    <linearGradient id="bagGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>

    <!-- Dégradé doré pour l'accent -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>

    <!-- Ombre portée -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi avec dégradé -->
  <rect width="1024" height="1024" rx="230" fill="url(#mainGradient)"/>

  <!-- Cercles décoratifs en arrière-plan -->
  <circle cx="820" cy="200" r="300" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="200" cy="830" r="250" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="650" cy="650" r="180" fill="#FFFFFF" opacity="0.05"/>

  <!-- Sac shopping principal -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- Corps du sac -->
    <path d="M -180 -80 L -210 240 Q -210 300 -150 300 L 150 300 Q 210 300 210 240 L 180 -80 Z"
          fill="url(#bagGradient)" opacity="0.98"/>

    <!-- Bordure supérieure du sac -->
    <rect x="-180" y="-100" width="360" height="20" rx="10" fill="url(#bagGradient)"/>

    <!-- Poignée gauche -->
    <path d="M -120 -80 Q -120 -180 -60 -180 Q -20 -180 0 -140"
          stroke="url(#bagGradient)" stroke-width="26" fill="none" stroke-linecap="round" opacity="0.95"/>

    <!-- Poignée droite -->
    <path d="M 120 -80 Q 120 -180 60 -180 Q 20 -180 0 -140"
          stroke="url(#bagGradient)" stroke-width="26" fill="none" stroke-linecap="round" opacity="0.95"/>

    <!-- Détails du sac - lignes verticales -->
    <line x1="-100" y1="-60" x2="-120" y2="260" stroke="#E0E7FF" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="-60" x2="120" y2="260" stroke="#E0E7FF" stroke-width="3" opacity="0.5"/>

    <!-- Accent doré - badge "N" -->
    <circle cx="0" cy="60" r="70" fill="url(#goldGradient)"/>
    <circle cx="0" cy="60" r="55" fill="#FFFFFF" opacity="0.2"/>

    <!-- Lettre N dans le badge -->
    <text x="0" y="95"
          font-family="Arial, sans-serif"
          font-size="90"
          font-weight="900"
          fill="#FFFFFF"
          text-anchor="middle">
      N
    </text>

    <!-- Étoile décorative (coin supérieur droit) -->
    <g transform="translate(140, -40)">
      <circle cx="0" cy="0" r="16" fill="url(#goldGradient)" opacity="0.8"/>
      <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.6"/>
    </g>
  </g>

  <!-- Effet de lumière en haut -->
  <ellipse cx="380" cy="220" rx="280" ry="120" fill="#FFFFFF" opacity="0.12" transform="rotate(-20 380 220)"/>
</svg>
