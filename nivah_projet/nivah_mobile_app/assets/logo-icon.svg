<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Version icône seule (sans texte) pour app icon -->
  <defs>
    <linearGradient id="gradientBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradientIcon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond arrondi -->
  <rect width="100" height="100" rx="22" fill="url(#gradientBg2)"/>
  
  <!-- Icône shopping bag + N -->
  <g transform="translate(50, 50)">
    <path d="M -20 -8 L -23 20 Q -23 26 -17 26 L 17 26 Q 23 26 23 20 L 20 -8 Z" 
          fill="url(#gradientIcon2)" 
          stroke="white" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <path d="M -14 -8 Q -14 -20 0 -20 Q 14 -20 14 -8" 
          fill="none" 
          stroke="white" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <g transform="translate(0, 6)">
      <path d="M -8 -6 L -8 12 M -8 -6 L 8 12 M 8 -6 L 8 12" 
            stroke="#8B5CF6" 
            stroke-width="2.5" 
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"/>
    </g>
  </g>
  
  <!-- Petite étoile -->
  <circle cx="80" cy="20" r="3" fill="white" opacity="0.8"/>
</svg>
