<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé coloré (rose -> violet -> orange) -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradientIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond arrondi avec dégradé -->
  <rect width="200" height="200" rx="45" fill="url(#gradientBg)"/>
  
  <!-- Icône de shopping bag stylisée (N intégré) -->
  <g transform="translate(100, 100)">
    <!-- Sac à provisions -->
    <path d="M -35 -15 L -40 35 Q -40 45 -30 45 L 30 45 Q 40 45 40 35 L 35 -15 Z" 
          fill="url(#gradientIcon)" 
          stroke="white" 
          stroke-width="3"
          stroke-linejoin="round"/>
    
    <!-- Poignée du sac -->
    <path d="M -25 -15 Q -25 -35 0 -35 Q 25 -35 25 -15" 
          fill="none" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round"/>
    
    <!-- Lettre N stylisée intégrée -->
    <g transform="translate(0, 10)">
      <path d="M -15 -10 L -15 20 M -15 -10 L 15 20 M 15 -10 L 15 20" 
            stroke="#8B5CF6" 
            stroke-width="4" 
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"/>
    </g>
  </g>
  
  <!-- Étoile décorative (coin supérieur droit) -->
  <circle cx="165" cy="35" r="6" fill="white" opacity="0.8"/>
  <circle cx="175" cy="50" r="4" fill="white" opacity="0.6"/>
  
  <!-- Texte NIVAH en bas -->
  <text x="100" y="185" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">NIVAH</text>
</svg>
