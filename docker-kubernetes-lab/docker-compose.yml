services:
  api:
    build:
      context: ./app
    environment:
      APP_NAME: "Docker Kubernetes Lab"
      NODE_ENV: "production"
      PORT: "3000"
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

